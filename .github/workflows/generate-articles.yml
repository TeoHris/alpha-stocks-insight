# ─────────────────────────────────────────────────────────────
# Alpha Stocks Insight — Automated Article Generator
# ─────────────────────────────────────────────────────────────
# Runs twice daily on weekdays:
#   • Pre-market  : 7:30 AM ET (11:30 UTC) — catches overnight news
#   • After-hours : 5:30 PM ET (21:30 UTC) — catches earnings + market close
#
# To trigger manually: GitHub → Actions → "Generate Articles" → Run workflow
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   ANTHROPIC_API_KEY   — from console.anthropic.com
#   FINNHUB_API_KEY     — from finnhub.io
# ─────────────────────────────────────────────────────────────

name: Generate Articles

on:
  schedule:
    # Pre-market: 7:30 AM ET (11:30 UTC), Monday–Friday
    - cron: '30 11 * * 1-5'
    # After-hours: 5:30 PM ET (21:30 UTC), Monday–Friday
    - cron: '30 21 * * 1-5'

  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

# Prevent two runs from overlapping (e.g. if a run takes longer than expected)
concurrency:
  group: generate-articles
  cancel-in-progress: false

jobs:
  generate:
    name: Screen tickers & generate articles
    runs-on: ubuntu-latest
    timeout-minutes: 45        # screening 630 tickers takes ~10 min; generation ~15 min

    steps:
      # ── 1. Check out the repo ──────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ───────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install dependencies ────────────────────────────
      - name: Install Python dependencies
        run: pip install anthropic requests python-dotenv

      # ── 4. Run the article generator ──────────────────────
      - name: Generate articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FINNHUB_API_KEY:   ${{ secrets.FINNHUB_API_KEY }}
        run: python generate_articles.py

      # ── 5. Commit & push if anything changed ──────────────
      - name: Commit and push new articles
        run: |
          git config user.name  "Alpha Stocks Bot"
          git config user.email "bot@alphastocksinsight.com"

          git add data/articles.json data/quotes.json

          if git diff --staged --quiet; then
            echo "✓ No new articles — nothing to commit."
          else
            TIMESTAMP=$(date -u +"%b %-d, %Y %H:%M UTC")
            ARTICLE_COUNT=$(python3 -c "import json; d=json.load(open('data/articles.json')); print(len(d))")
            git commit -m "Auto-publish articles — $TIMESTAMP ($ARTICLE_COUNT total)"
            git push
            echo "✅ Pushed — Vercel will deploy within ~60 seconds."
          fi
